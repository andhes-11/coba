<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas Mulok</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

/* HEADER */
.header {
    background: linear-gradient(to right, #2c6df2, #3f8cff);
    text-align: center;
    padding: 40px 20px 60px;
    color: white;
}

.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 5px solid white;
    margin-bottom: 15px;
}

.header h1 {
    font-size: 22px;
    margin: 0;
}

/* CONTENT */
.container {
    padding: 20px;
    margin-top: -30px;
}

/* BOX */
.box {
    background: #eaeaea;
    padding: 18px;
    border-radius: 15px;
    margin-bottom: 15px;
    text-align: center;
    font-size: 16px;
    color: #333;
    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}

.dots {
    letter-spacing: 4px;
}
</style>

</head>
<body>

<div class="header">
    <img src="https://www.shutterstock.com/image-illustration/tkj-original-monogram-logo-design-260nw-1649440348.jpg" class="avatar" alt="">
    <h1>Tugas Andhes Prakoso XI-TKJ<br>Muatan Lokal</h1>
</div>

<div class="container">
    <div class="box">Kotak Titik</div>
    <div class="box dots">••••••••••</div>
    <div class="box dots">••••••••••</div>
    <div class="box dots">••••••••••</div>
    <div class="box dots">••••••••••</div>
</div>

</body>
</html>
